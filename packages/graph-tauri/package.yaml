name: "@alaq/graph-tauri"
version: 6.0.0-alpha.0
description: "@alaq/graph generator: emits typed TS wrappers over
  @tauri-apps/api/core.invoke for every action in the SDL namespace."
license: Apache-2.0
author: Gleb Panteleev <panteleew@gleb.pw>
homepage: https://github.com/carabins/alak/tree/master/packages/graph-tauri
repository:
  type: git
  url: git+https://github.com/carabins/alak.git
  directory: packages/graph-tauri
bugs:
  url: https://github.com/carabins/alak/issues
engines:
  bun: ">=1.3.0"
  node: ">=20"
type: module
main: ./src/index.ts
types: ./dist/index.d.ts
scripts:
  sync:version: bun ../../scripts/sync-generator-versions.ts
  build:types: bun ../../scripts/sync-generator-versions.ts && tsc -p tsconfig.build.json
  test: bun ../../scripts/sync-generator-versions.ts && bun test
keywords:
  - alaq
  - graph
  - generator
  - tauri
  - ipc
  - codegen
peerDependencies:
  "@alaq/plugin-tauri": 6.0.0-alpha.0
  "@tauri-apps/api": ^2.0.0
peerDependenciesMeta:
  "@alaq/plugin-tauri":
    optional: true
  "@tauri-apps/api":
    optional: true
publishConfig:
  access: public
