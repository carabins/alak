name: "@alaq/graph-zenoh"
version: "6.0.0-alpha.0"
description: "@alaq/graph generator: emits Rust structs + zenoh pub/sub/query handlers from an AQL IR."
license: Apache-2.0
author: "Gleb Panteleev <panteleew@gleb.pw>"
homepage: https://github.com/carabins/alak/tree/master/packages/graph-zenoh
repository:
  type: git
  url: git+https://github.com/carabins/alak.git
  directory: packages/graph-zenoh
bugs:
  url: https://github.com/carabins/alak/issues
engines:
  bun: ">=1.3.0"
  node: ">=20"
type: module
main: ./src/index.ts
types: ./dist/index.d.ts
scripts:
  check: bun run scripts/check-kotelok.ts
  build:types: tsc -p tsconfig.build.json
keywords:
  - alaq
  - graph
  - generator
  - zenoh
  - rust
  - wire-protocol
  - codegen
publishConfig:
  access: public
