name: "@alaq/graph-axum"
version: 6.0.0-alpha.0
description: "@alaq/graph generator: emits Axum routers + typed Handlers trait +
  AppState from an AQL IR."
type: module
main: ./src/index.ts
types: ./dist/index.d.ts
scripts:
  sync:version: bun ../../scripts/sync-generator-versions.ts
  build:types: bun ../../scripts/sync-generator-versions.ts && tsc -p tsconfig.build.json
keywords:
  - alaq
  - graph
  - generator
  - axum
  - rust
  - http
  - codegen
publishConfig:
  access: public
