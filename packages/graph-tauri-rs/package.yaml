name: "@alaq/graph-tauri-rs"
version: "6.0.0-alpha.0"
description: "@alaq/graph generator: emits Rust Tauri v2 commands, handlers trait, and Input/Output structs from an AQL IR."
license: Apache-2.0
author: "Gleb Panteleev <panteleew@gleb.pw>"
homepage: https://github.com/carabins/alak/tree/master/packages/graph-tauri-rs
repository:
  type: git
  url: git+https://github.com/carabins/alak.git
  directory: packages/graph-tauri-rs
bugs:
  url: https://github.com/carabins/alak/issues
engines:
  bun: ">=1.3.0"
  node: ">=20"
type: module
main: ./src/index.ts
types: ./dist/index.d.ts
scripts:
  sync:version: bun ../../scripts/sync-generator-versions.ts
  build:types: bun ../../scripts/sync-generator-versions.ts && tsc -p tsconfig.build.json
keywords:
  - alaq
  - graph
  - generator
  - tauri
  - rust
  - ipc
  - codegen
publishConfig:
  access: public
