name: "@alaq/graph-tauri-rs"
version: 6.0.0-alpha.0
description: "@alaq/graph generator: emits Rust Tauri v2 commands, handlers
  trait, and Input/Output structs from an AQL IR."
type: module
main: ./src/index.ts
types: ./dist/index.d.ts
scripts:
  sync:version: bun ../../scripts/sync-generator-versions.ts
  build:types: bun ../../scripts/sync-generator-versions.ts && tsc -p tsconfig.build.json
keywords:
  - alaq
  - graph
  - generator
  - tauri
  - rust
  - ipc
  - codegen
publishConfig:
  access: public
