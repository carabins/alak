name: "@alaq/plugin-logi"
version: 6.0.0-alpha.0
description: "Logi observability plugin for Nucl and Atom — streams state
  mutations, actions, and errors to a self-hosted Logi endpoint. AI-first:
  fingerprints, traces, and release/reload tracking built-in."
type: module
main: ./src/index.ts
types: ./dist/index.d.ts
scripts:
  build:types: tsc -p tsconfig.build.json
  test: bun test
keywords:
  - alaq
  - plugin
  - logi
  - observability
  - ai-first
  - telemetry
  - nucl
  - atom
dependencies:
  "@alaq/nucl": 6.0.0-alpha.0
  "@alaq/quark": 6.0.0-alpha.0
  "@alaq/rune": 6.0.0-alpha.0
devDependencies:
  "@logi/browser": file:../../../logi/packages/logi-js
peerDependencies:
  "@logi/browser": ^0.1.0
publishConfig:
  access: public
