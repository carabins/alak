name: "@alaq/atom"
version: 6.0.0-alpha.0
description: Minimal reactive state management built on Quark
license: Apache-2.0
author: Gleb Panteleev <panteleew@gleb.pw>
homepage: https://github.com/carabins/alak/tree/master/packages/atom
repository:
  type: git
  url: git+https://github.com/carabins/alak.git
  directory: packages/atom
bugs:
  url: https://github.com/carabins/alak/issues
engines:
  bun: ">=1.3.0"
  node: ">=20"
type: module
main: ./src/index.ts
types: ./dist/index.d.ts
scripts:
  build: bun run ../../scripts/index.ts build
  build:types: tsc -p tsconfig.build.json
  test: bun test
  dev: bun test --watch
keywords:
  - reactive
  - state
  - atom
  - quark
  - alaq
dependencies: {}
devDependencies:
  "@types/bun": latest
  "@alaq/quark": 6.0.0-alpha.0
  "@alaq/nucl": 6.0.0-alpha.0
peerDependencies:
  "@alaq/quark": 6.0.0-alpha.0
  "@alaq/nucl": 6.0.0-alpha.0
publishConfig:
  access: public
