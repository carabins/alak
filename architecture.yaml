# Alaq v6 — package roles and boundaries
# Machine-readable architecture manifest. AGENTS.md references this.

version: 1

tiers:
  tier0:
    name: Lightweight SPA
    drivers: [ws, http]
    note: No Zenoh. Browser-friendly bundle.
  tier1:
    name: Rich web app
    drivers: [ws, http, webrtc]
    note: Adds P2P. Still browser-friendly.
  tier2:
    name: Native
    drivers: [ws, http, zenoh]
    note: Tauri, CLI, server. Zenoh as primary.
  tier3:
    name: PWA mesh peer
    drivers: [zenoh-wasm]
    note: Rare. Explicit opt-in. ~2MB WASM cost.

packages:

  # ── Reactive core ──

  - name: "@alaq/quark"
    path: packages/quark
    role: core-primitive
    layer: runtime
    depends_on: []
    exports: [Quark, IQuark, createQuark]
    note: Zero-dependency reactive primitive. Stable, 107 tests green.

  - name: "@alaq/nucl"
    path: packages/nucl
    role: primitive
    layer: runtime
    depends_on: ["@alaq/quark"]
    exports: [Nucl, kind, Fusion]
    note: Stable, 43 tests green.

  - name: "@alaq/atom"
    path: packages/atom
    role: state-model
    layer: runtime
    depends_on: ["@alaq/quark", "@alaq/nucl"]
    exports: [Atom]
    note: Stable, 38 tests green.

  - name: "@alaq/fx"
    path: packages/fx
    role: effects
    layer: runtime
    depends_on: ["@alaq/quark"]
    note: 9 tests green.

  # ── Nucl/Atom plugins (kind-based extensions of reactive core) ──

  - name: "@alaq/plugin-logi"
    path: packages/plugin-logi
    role: plugin-observability
    layer: runtime
    depends_on: ["@alaq/quark", "@alaq/nucl"]
    peer_optional: ["@logi/browser"]
    exports: [logiPlugin, emitFrame, traceAction, beginSpan, endSpan, withTrace, currentTrace, shapeOf, getReload, createLogiBrowserTransport]
    kinds: [logi]
    backend_service:
      name: logi
      dev_endpoint: "http://localhost:8080"
      dev_token: demo_project_token
      how_to_start: "cd A:/source/logi && docker compose up -d"
    capabilities:
      - nucl-mutation-frames
      - action-span-tracing
      - release-reload-tagging
      - shape-only-by-default
      - debug-values-opt-in
    note: 8 tests green. Emits LogiFrame objects over configurable transport; default transport lazy-loads @logi/browser.

  - name: "@alaq/plugin-idb"
    path: packages/plugin-idb
    role: plugin-persistence
    layer: runtime
    depends_on: ["@alaq/quark", "@alaq/nucl"]
    peer_optional: ["@alaq/plugin-logi"]
    exports: [idbPlugin, createFakeIDB]
    kinds: [idb, idb-collection]
    capabilities:
      - kv-single-value
      - collection-with-indexes
      - optimistic-writes
      - debounced-flush
      - ready-and-saved-companion-nucls
      - logi-integration-optional
    note: 20 tests green. Fake IDB shipped for bun tests (no external deps).

  - name: "@alaq/plugin-tauri"
    path: packages/plugin-tauri
    role: plugin-ipc
    layer: runtime
    depends_on: ["@alaq/quark", "@alaq/nucl"]
    peer_optional: ["@alaq/plugin-logi", "@tauri-apps/api"]
    exports: [tauriPlugin, createFakeIPC]
    kinds: [tauri, tauri-command]
    capabilities:
      - state-mode-read-write-listen
      - command-mode-ad-hoc-invoke
      - ready-saved-error-companion-nucls
      - lazy-tauri-api-import
      - graceful-degradation-non-tauri
    note: |
      17 tests green. Not to be confused with future @alaq/link-tauri — that one
      is a LinkDriver for Tauri-specific peer discovery in CRDT mesh (different
      layer). plugin-tauri is a flat IPC wrapper for nucl atoms.

  # ── Transport and sync ──

  - name: "@alaq/link"
    path: packages/link
    role: transport-core
    layer: runtime
    depends_on: []
    tiers: [tier0, tier1, tier2, tier3]
    capabilities:
      - qos
      - crdt-primitives
      - drivers-pluggable
      - sync-bridge
      - clock-sync
    drivers_included: [ws, http, webrtc]
    note: Core transport. Additional drivers are separate packages.

  - name: "@alaq/link-state"
    path: packages/link-state
    role: client-replica
    layer: runtime
    depends_on: ["@alaq/link", "@alaq/deep-state"]
    exports: [SyncStore, SyncNode, createSyncNode, createListNode, createMapNode, SyncListNode, SyncMapNode]
    note: SyncStore with Ghost Proxies + per-entry accessors for lists/maps. Target of @alaq/graph-link-state generator.

  # ── Graph compiler and plugins ──

  - name: "@alaq/graph"
    path: packages/graph
    role: spec-core
    layer: compile-time
    depends_on: []
    exports: [parseSchema, compileToIR, IR types]
    owns_directives: [sync, store, scope, auth, this, crdt, atomic, liveness, deprecated, added, range]
    note: SDL parser + IR. Transport-neutral. See packages/graph/SPEC.md.

  - name: "@alaq/graph-link-state"
    path: packages/graph-link-state
    role: generator
    layer: compile-time
    depends_on: ["@alaq/graph"]
    target: "@alaq/link-state"
    output: "TypeScript SyncStore + SyncNode<T> bindings"
    status: planned

  - name: "@alaq/graph-link-server"
    path: packages/graph-link-server
    role: generator
    layer: compile-time
    depends_on: ["@alaq/graph"]
    target: "@alaq/link/server"
    output: "TypeScript ActionHandlers + dispatcher wiring createLinkServer onAction"
    status: alpha

  - name: "@alaq/graph-tauri"
    path: packages/graph-tauri
    role: generator
    layer: compile-time
    depends_on: ["@alaq/graph"]
    target: Tauri v2 commands + typed invoke wrappers
    output: "Rust #[tauri::command] + TS invoke(...)"
    status: planned

  - name: "@alaq/graph-zenoh"
    path: packages/graph-zenoh
    role: generator
    layer: compile-time
    depends_on: ["@alaq/graph"]
    target: Zenoh-compatible wire protocol
    output: "Rust structs + pub/sub/query handlers using zenoh crate"
    note: Reference runtime. Used to validate wire compatibility with Sokol-Bus-class peers.
    status: alpha

  # ── Helpers and utilities (existing, not in active redesign) ──

  - name: "@alaq/deep-state"
    path: packages/deep-state
    role: reactive-helper

  - name: "@alaq/bitmask"
    path: packages/bitmask
    role: utility

  - name: "@alaq/datastruct"
    path: packages/datastruct
    role: utility

  - name: "@alaq/queue"
    path: packages/queue
    role: utility

  - name: "@alaq/rune"
    path: packages/rune
    role: utility

  - name: "@alaq/svg"
    path: packages/svg
    role: ui-helper

  - name: "@alaq/vite"
    path: packages/vite
    role: tooling

  - name: "@alaq/vue"
    path: packages/vue
    role: ui-adapter

  - name: "@alaq/link-state-vue"
    path: packages/link-state-vue
    role: ui-adapter
    depends_on: ["@alaq/link-state", "@alaq/quark"]
    peer: ["vue ^3"]
    exports: [useNode, useNodeWithDefault, toRefNoScope, provideStore, useStore, SYNC_STORE_KEY]
    note: |
      Bridges ISyncNode<T> into Vue's Ref via up/down subscription. Automatic cleanup
      via onScopeDispose. provideStore/useStore for tree-wide SyncStore injection.

  - name: "@alaq/flex"
    path: packages/flex
    role: ui-adapter
    note: PixiJS layout/components.

  - name: "@alaq/xstate"
    path: packages/xstate
    role: ui-adapter

  - name: "@alaq/ws"
    path: packages/ws
    role: transport-helper

  - name: "@alaq/gql"
    path: packages/gql.replaced
    status: replaced-by "@alaq/graph"
    note: |
      Early draft with GraphQL SDL. Replaced by @alaq/graph (.aql format, v0.3).
      Content moved to packages/gql.replaced/ on 2026-04-19 after the @alaq/graph
      stack reached 346 tests green + cargo-verified. Do not import, do not extend.
      Kept for reference only.

  # ── AI-facing tooling ──

  - name: "@alaq/mcp"
    path: packages/mcp
    role: ai-tooling
    layer: tooling
    depends_on: ["@alaq/graph"]
    exports: [schemaCompile, schemaDiff, diffIR, runServer, alaqCapabilities, alaqTrace, alaqAtomActivity, alaqHotAtoms, alaqIdbStores, alaqIdbStoreStats, alaqIdbErrors]
    bin: { alaq-mcp: "src/bin.ts", alaq-mcp-call: "src/cli.ts" }
    tool_groups:
      compile_time: [schema_compile, schema_diff]
      runtime_observation: [alaq_capabilities, alaq_trace, alaq_atom_activity, alaq_hot_atoms, alaq_idb_stores, alaq_idb_store_stats, alaq_idb_errors]
    reads_from:
      logi_http_api:
        endpoint_default: "http://localhost:8080"
        endpoint_env: LOGI_ENDPOINT
        project_env: LOGI_PROJECT
    note: |
      Stdio JSON-RPC MCP server. 50 tests green (14 new runtime unit + 1 live integration).
      Runtime tools read Logi HTTP API directly (no proxy through Logi MCP).
      Self-describing via alaq_capabilities: AI in a fresh session calls it first.

  # ── Deferred / draft ──

  - name: "@alaq/state"
    path: packages/state.draft
    status: deferred
    note: UI view/data/actions/children DSL. Reopen when runtime UI generation is needed.

  - name: "alaq"
    path: packages/alaq (planned)
    status: planned
    role: meta-seed
    layer: tooling
    note: |
      AI-first seed package. `bun add alaq` installs a minimal surface + manifest.json
      (ecosystem catalog) + doctor/new/install/decide/sync CLI. Drops `.alaq/project.json`
      in consumer projects for long-term decision/runtime memory. See alaq.md (planned).

forbidden_dependencies:
  - from: "@alaq/graph"
    to: "@alaq/graph-*"
    reason: Core must not depend on plugins.
  - from: "@alaq/graph-*"
    to: "@alaq/graph-*"
    reason: Plugins must not depend on each other.
  - from: "@alaq/link"
    to: "@alaq/link-zenoh"
    reason: Core transport stays tier0-sufficient.
  - from: "@alaq/plugin-*"
    to: "@alaq/plugin-*"
    reason: |
      Plugins must not hard-depend on each other. Cross-plugin integration
      (e.g. plugin-idb emitting frames through plugin-logi) uses optional peer
      dependencies + runtime-nullable hooks (like emitFrame returning noop
      when plugin-logi runtime is not registered).
  - from: "@alaq/nucl"
    to: "@alaq/plugin-*"
    reason: Core reactive primitive must not depend on extensions.

plugin_naming_rule:
  pattern: "@alaq/<family>-<transport-or-platform-or-function>"
  examples:
    - "@alaq/graph-link-state"     # family=graph, target=link-state
    - "@alaq/graph-zenoh"          # family=graph, target=zenoh
    - "@alaq/plugin-logi"          # family=plugin, function=logi observability
    - "@alaq/plugin-idb"           # family=plugin, platform=IndexedDB
    - "@alaq/plugin-tauri"         # family=plugin, platform=Tauri
  forbidden:
    - "@alaq/graph-<product>"      # e.g. graph-kotelok, graph-valkyrie
    - "@alaq/link-<product>"
    - "@alaq/plugin-<product>"     # e.g. plugin-kladinets
  reason: Products consume plugins; they are not compilation or extension targets.
